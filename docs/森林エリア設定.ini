### 概要

「錆びれた森林」は、**マナコア暴走**による軍事工業地帯の崩壊と、その副産物である**鉄粉災害**が森林保護区に長期降下したことで成立した地域。空と水と植生が赤茶に染まり、時間経過で廃機械と樹木が絡み合うことで、**森＋錆びた機械**の景観を形成する。

### 発端：荒廃発生（マナコア暴走）

**テーマ中心：マナコア暴走**

※ この地域の「マナコア」は、用語としては [マナリエナ](https://www.notion.so/321a3690c49180d192dadfc851252ecd?pvs=21)（= マナリエア）に該当し、マナの流出と還元が起きる循環の結節点として扱う。

起きる現象

- 瞬間的マナ枯渇
- 同時に巨大マナ消費
- 爆発・衝撃
- 工場群崩壊

この時点で、**軍事生産拠点の製鉄設備が吹き飛ぶ**。

### 鉄粉災害（一次災害）

破壊された設備

- 精錬設備
- 鍛造炉
- 粉砕機

放出

- **鉄粉・鉄スラグが大量に空中へ拡散**
- 森林保護区に長期間降り続ける

即時の結果

- 空が赤茶の粉塵雲に覆われる
- 日光が弱まる
- 森が赤く染まる

→ この段階で「森が錆びて見える」状態が成立。

### 長期環境変化（二次変化）

粉塵が地面に堆積し、森林環境が変質。

森林環境

- 土壌の鉄濃度が上昇
- 水系も鉄分が増加

生物学的変化

- **鉄酸化細菌が爆増**（現実でも起こりうる現象）

結果

- 水がオレンジ色に濁る
- 湿地が錆色に変色する

### 植物の適応（生態の再編）

条件

- 日光が弱い
- 土壌鉄が過剰

影響

- 多くの一般的な植物は枯れる
- 生き残った種が**鉄耐性へ進化**
- さらに、鉄を体内に隔離する仕組みが発達

視覚的特徴（プレイヤー視点）

- 樹皮が赤茶色
- 幹が黒赤色

### 機械との融合（景観の完成）

時間経過で、森林に残骸が取り込まれる。

絡みつかれる対象

- 監視塔
- 遊覧道路
- ドローン残骸

進行

- 木が構造物に絡む
- 露出した金属が腐食する

結果

- **森＋錆びた機械**が一体化した景観になる

### 使える演出メモ（短文）

- 風が吹くと赤茶の粉が舞い、視界が少し霞む
- 水辺はオレンジの膜や沈殿が見え、足元がぬかるむ
- 金属面は触ると脆く、樹根がリベットや継ぎ目を割っている